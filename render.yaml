services:
  - type: web
    name: connecthub
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn connecthub.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render generates a random value
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALLOWED_HOSTS
        value: "connecthub.onrender.com"
      - key: DATABASE_URL
        fromDatabase:              # Render injects this automatically
          name: connecthub-db
          property: connectionString

databases:
  - name: connecthub-db
    databaseName: connecthub_prod
    user: connecthub
    plan: free

